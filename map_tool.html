<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.2/simple-lightbox.min.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.2/simple-lightbox.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { height: 100vh; width: 100vw; }
        .photo-marker { border: 2px solid #fff; border-radius: 4px; overflow: hidden; cursor: pointer; }
        .photo-marker img { width: 100%; height: 100%; object-fit: cover; }
        .popup-card { width: 250px; text-align: center; }
        .popup-card img { width: 100%; border: 3px solid white; border-radius: 4px; margin-bottom: 10px; cursor: zoom-in; }
        .popup-info { font-size: 12px; text-align: left; color: #333; line-height: 1.5; }
        /* 拡大時に余白をなくして、画像を最大限大きく表示 */
        .sl-wrapper .sl-image img {
            max-width: 100vw !important;
            max-height: 100vh !important;
            object-fit: contain !important;
            padding: 0 !important;
        }
        /* キャプションが画像に被らないよう調整 */
        .sl-wrapper .sl-caption {
            bottom: 20px;
        }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <input type="file" id="file-input" style="display:none;" accept="image/jpeg">

   <script>
        const map = L.map('map').setView([35.6812, 139.7671], 13);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

        function formatSS(ss) {
            if (!ss) return "N/A";
            if (ss >= 1) return ss + "s";
            return "1/" + Math.round(1 / ss) + "s";
        }

        function createMarker(d) {
            const html = `
                <div class="popup-card">
                    <a href="${d.url}" class="gallery-item"><img src="${d.url}"></a>
                    <div class="popup-info">
                        <b>Date:</b> ${d.info.date}<br>
                        <b>Camera:</b> ${d.info.camera}<br>
                        <b>Setting:</b> ${d.info.focal} | f/${d.info.f} | ISO${d.info.iso} | ${d.info.ss}
                    </div>
                </div>`;
            L.marker([d.lat, d.lon], {
                icon: L.divIcon({className: 'photo-marker', html: `<img src="${d.url}">`, iconSize: [50, 50]})
            }).addTo(map).bindPopup(html);
            new SimpleLightbox('.gallery-item');
        }

        // 管理者判定
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = (urlParams.get('admin') === 'himitsu123');

        // 1. 固定写真の表示
        const fixedPhotos = [
            {
                lat: 35.70362872103316, lon: 139.75351274013522, url: "20260621-DSC00377.jpg",
                info: { "date":"2026/6/21 19:59:49","camera":"Sony α7C II","focal":"28mm","f":2.8,"iso":2500,"ss":"1/60s" }
            }
        ];
        fixedPhotos.forEach(p => createMarker(p));

        // 2. アップロード処理 (一本化)
        if (isAdmin) {
            document.getElementById('file-input').onchange = async (e) => {
                const file = e.target.files[0];
                const exif = await exifr.parse(file);
                const data = {
                    url: URL.createObjectURL(file),
                    lat: exif.latitude, lon: exif.longitude,
                    info: {
                        date: exif.DateTimeOriginal ? exif.DateTimeOriginal.toLocaleString() : "不明",
                        camera: exif.Model || '不明',
                        focal: (exif.FocalLength || '0') + 'mm',
                        f: exif.FNumber || '0',
                        iso: exif.ISO || '0',
                        ss: formatSS(exif.ExposureTime)
                    }
                };

                // 場所が決まっていない場合のみクリックを待つ
                if (data.lat && data.lon) {
                    createMarker(data);
                    console.log("追加データ:", JSON.stringify(data));
                } else {
                    alert("地図をクリックして場所を指定してください");
                    map.once('click', (e) => { 
                        data.lat = e.latlng.lat; 
                        data.lon = e.latlng.lng; 
                        createMarker(data);
                        console.log("追加データ:", JSON.stringify(data));
                    });
                }
            };
            map.getContainer().addEventListener('dblclick', () => document.getElementById('file-input').click());
        }
    </script>
</body>
</html>
